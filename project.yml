name: Fantastty
options:
  bundleIdPrefix: com.blainecook
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  Fantastty:
    type: application
    platform: macOS
    sources:
      - path: Fantastty
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blainecook.fantastty
        PRODUCT_NAME: Fantastty
        INFOPLIST_FILE: Fantastty/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_OBJC_BRIDGING_HEADER: Fantastty/BridgingHeader.h
        CODE_SIGN_ENTITLEMENTS: Fantastty/Fantastty.entitlements
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/xcframework"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: "minimal"
        OTHER_LDFLAGS:
          - "-lstdc++"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - framework: xcframework/GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
    entitlements:
      path: Fantastty/Fantastty.entitlements
